<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
</head>
<body class="min-h-screen bg-slate-50 text-slate-900">
    <main class="mx-auto flex min-h-screen max-w-md items-center px-4">
        <section class="w-full rounded border border-slate-200 bg-white p-6">
            <div class="mb-6 text-center">
                <div class="mx-auto mb-3 flex h-12 w-12 items-center justify-center rounded bg-blue-600 text-white">
                    <i class="bi bi-broadcast text-xl"></i>
                </div>
                <h1 class="text-xl font-semibold">工作台</h1>
                <p class="mt-1 text-sm text-slate-500">请输入账号密码登录</p>
            </div>

            <div id="errorMessage" class="mb-4 hidden rounded border border-red-200 bg-red-50 p-3 text-sm text-red-700">
                <i class="bi bi-exclamation-circle"></i>
                <span id="errorText">用户名或密码错误</span>
            </div>

            <form id="loginForm" method="POST" action="/login" class="space-y-4">
                <label class="block">
                    <span class="mb-1 block text-sm font-medium text-slate-700">用户名</span>
                    <input name="username" class="w-full rounded border border-slate-300 px-3 py-2 text-sm focus:border-blue-500 focus:outline-none" placeholder="admin" required autofocus>
                </label>
                <label class="block">
                    <span class="mb-1 block text-sm font-medium text-slate-700">密码</span>
                    <input type="password" name="password" class="w-full rounded border border-slate-300 px-3 py-2 text-sm focus:border-blue-500 focus:outline-none" placeholder="请输入密码" required>
                </label>
                <label class="flex items-center gap-2 text-sm text-slate-600">
                    <input type="checkbox" name="remember" class="rounded border-slate-300">
                    <span>记住我</span>
                </label>
                <button type="submit" id="loginBtn" class="w-full rounded bg-blue-600 px-3 py-2 text-sm font-medium text-white hover:bg-blue-700 disabled:opacity-60">
                    登录
                </button>
            </form>
        </section>
    </main>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async event => {
            event.preventDefault();
            const btn = document.getElementById('loginBtn');
            const errorMsg = document.getElementById('errorMessage');
            btn.disabled = true;
            btn.textContent = '登录中...';
            errorMsg.classList.add('hidden');

            try {
                const response = await fetch('/login', {method: 'POST', body: new FormData(event.target)});
                if (response.ok) {
                    location.href = '/';
                    return;
                }
                const data = await response.json().catch(() => ({}));
                document.getElementById('errorText').textContent = data.detail || '登录失败，请重试';
                errorMsg.classList.remove('hidden');
            } catch (error) {
                document.getElementById('errorText').textContent = '网络错误，请检查连接';
                errorMsg.classList.remove('hidden');
            } finally {
                btn.disabled = false;
                btn.textContent = '登录';
            }
        });
    </script>
</body>
</html>
