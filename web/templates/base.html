<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}工作台{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style type="text/tailwindcss">
        @layer components {
            .nav-link { @apply flex items-center gap-2 rounded px-3 py-2 text-slate-700 hover:bg-slate-100; }
            .nav-link.active, .page-btn.active, .filter-chip.active, .monitor-type-tag.active, .log-filter-btn.active { @apply border-blue-600 bg-blue-600 text-white; }
            .data-card, .config-card, .account-card, .channel-card, .stat-card, .stat-item, .wizard-card, .message-card { @apply rounded border border-slate-200 bg-white p-4; }
            .data-card-header { @apply mb-3 flex items-center justify-between border-b border-slate-200 pb-3; }
            .data-card-title { @apply text-base font-semibold; }
            .dashboard-grid, .config-grid { @apply grid gap-4 lg:grid-cols-2; }
            .stats-grid, .stats-row { @apply mb-4 grid gap-4 sm:grid-cols-2 lg:grid-cols-4; }
            .stats-grid { @apply mb-6; }
            .stat-header { @apply flex items-center justify-between; }
            .stat-title { @apply text-sm text-slate-500; }
            .stat-icon { @apply text-xl text-blue-600; }
            .stat-value { @apply mt-2 text-2xl font-semibold; }
            .stat-label { @apply text-sm text-slate-500; }
            .stat-change { @apply mt-2 flex items-center gap-1 text-xs text-slate-500; }
            .stat-footer { @apply mt-3 border-t border-slate-200 pt-3 text-xs text-slate-500; }
            .metric-item { @apply flex items-center justify-between border-b border-slate-100 py-2; }
            .metric-label { @apply text-sm text-slate-500; }
            .metric-value { @apply font-medium; }
            .progress-bar { @apply h-2 overflow-hidden rounded bg-slate-200; }
            .progress-fill { @apply h-full rounded bg-blue-600; }
            .quick-actions { @apply grid gap-3 sm:grid-cols-2; }
            .quick-action-btn { @apply flex items-center gap-2 rounded border border-slate-200 bg-white p-3 text-sm hover:bg-slate-50; }
            .quick-action-icon { @apply text-blue-600; }

            .btn { @apply inline-flex items-center justify-center gap-2 rounded border border-slate-300 bg-white px-3 py-2 text-sm font-medium text-slate-700 hover:bg-slate-50; }
            .btn:disabled, .btn.disabled, .page-btn.disabled { @apply cursor-not-allowed opacity-50; }
            .btn-primary { @apply border-blue-600 bg-blue-600 text-white hover:bg-blue-700; }
            .btn-secondary { @apply border-slate-300 bg-white text-slate-700 hover:bg-slate-50; }
            .btn-success, .btn-outline-success { @apply border-green-600 bg-green-600 text-white hover:bg-green-700; }
            .btn-danger, .btn-outline-danger { @apply border-red-600 bg-red-600 text-white hover:bg-red-700; }
            .btn-info { @apply border-sky-600 bg-sky-600 text-white hover:bg-sky-700; }
            .btn-warning { @apply border-amber-500 bg-amber-500 text-white hover:bg-amber-600; }
            .btn-outline-primary { @apply border-blue-600 text-blue-700 hover:bg-blue-50; }
            .btn-sm { @apply px-2 py-1 text-xs; }
            .btn-icon { @apply p-2; }
            .action-buttons, .logs-actions { @apply flex flex-wrap gap-2; }
            .action-btn, .account-action-btn { @apply inline-flex items-center justify-center rounded border border-slate-300 bg-white px-2 py-1 text-xs text-slate-700 hover:bg-slate-50; }
            .account-action-btn { @apply items-center gap-1; }
            .action-btn.delete, .action-btn.danger, .account-action-btn.danger, .account-action-btn.delete { @apply border-red-600 text-red-700 hover:bg-red-50; }
            .action-btn.warning, .account-action-btn.warning { @apply border-amber-500 text-amber-700 hover:bg-amber-50; }
            .action-btn.success { @apply border-green-600 text-green-700 hover:bg-green-50; }

            .form-group { @apply mb-4; }
            .form-label { @apply mb-1 block text-sm font-medium text-slate-700; }
            .form-input, .form-select, .form-textarea { @apply w-full rounded border border-slate-300 bg-white px-3 py-2 text-sm text-slate-900 focus:border-blue-500 focus:outline-none; }
            .form-grid { @apply grid gap-4 md:grid-cols-2; }
            .form-checkbox-group, .form-radio-group, .import-mode-options { @apply grid gap-2; }
            .form-help, .text-muted { @apply mt-1 text-xs text-slate-500; }
            .form-checkbox, .checkbox-wrapper, .radio-label { @apply flex items-center gap-2 text-sm; }
            .form-range { @apply w-full; }
            .form-section { @apply mb-6; }
            .form-section-title { @apply mb-3 font-semibold; }
            .required::after { content: "*"; @apply ml-1 text-red-500; }

            .table-responsive { @apply overflow-x-auto rounded border border-slate-200 bg-white; }
            .table { @apply min-w-full text-sm; }
            .table th { @apply bg-slate-50 px-3 py-2 text-left font-semibold; }
            .table td { @apply border-t border-slate-200 px-3 py-2; }
            .pagination { @apply mt-4 flex flex-wrap items-center gap-2; }
            .page-btn { @apply rounded border border-slate-300 bg-white px-3 py-1 text-sm hover:bg-slate-50; }
            .page-info { @apply text-sm text-slate-500; }

            .account-selector-container { @apply mb-4 rounded border border-slate-200 bg-white p-4; }
            .account-selector-content { @apply flex flex-wrap items-end gap-3; }
            .account-selector-wrapper { @apply min-w-[16rem] flex-1; }
            .account-selector-label { @apply mb-1 flex items-center gap-2 text-sm font-medium text-slate-700; }
            .accounts-grid, .channels-grid { @apply grid gap-4 sm:grid-cols-2 xl:grid-cols-3; }
            .account-header, .channel-header { @apply flex gap-3; }
            .channel-header { @apply items-start; }
            .account-avatar { @apply relative flex h-10 w-10 shrink-0 items-center justify-center rounded bg-blue-100 font-semibold text-blue-700; }
            .account-status-dot { @apply absolute -bottom-0.5 -right-0.5 h-3 w-3 rounded-full border border-white bg-green-500; }
            .account-info, .channel-info { @apply min-w-0 flex-1; }
            .account-name, .channel-name, .channel-title { @apply truncate font-medium; }
            .account-phone, .channel-username, .channel-type { @apply text-sm text-slate-500; }
            .account-phone { @apply mt-1; }
            .account-body { @apply mt-4; }
            .account-stats { @apply grid grid-cols-2 gap-2; }
            .account-stat { @apply rounded bg-slate-50 p-2 text-center; }
            .account-stat-value { @apply font-semibold; }
            .account-stat-label { @apply text-xs text-slate-500; }
            .account-actions, .channel-actions { @apply mt-4 flex flex-wrap gap-2; }
            .channel-actions { @apply mt-3; }
            .add-account-card { @apply cursor-pointer rounded border border-dashed border-slate-300 bg-white p-6 text-center text-slate-600 hover:bg-slate-50; }
            .add-account-icon { @apply mb-2 text-2xl text-blue-600; }
            .add-account-text { @apply font-medium text-slate-900; }
            .add-account-subtext { @apply text-sm text-slate-500; }
            .channel-icon, .channel-avatar { @apply flex h-9 w-9 shrink-0 items-center justify-center rounded bg-blue-100 text-blue-700; }
            .channel-avatar { @apply font-semibold; }
            .channel-description { @apply mt-2 text-sm text-slate-600; }
            .channel-meta { @apply mt-3 border-t border-slate-200 pt-3 text-xs text-slate-500; }
            .copy-btn { @apply rounded border border-slate-300 px-2 py-1 text-xs hover:bg-slate-50; }

            .filter-bar { @apply mb-4 space-y-3; }
            .search-box { @apply relative; }
            .search-input { @apply w-full rounded border border-slate-300 bg-white px-3 py-2 pr-9 text-sm focus:border-blue-500 focus:outline-none; }
            .search-icon { @apply absolute right-3 top-1/2 -translate-y-1/2 text-slate-400; }
            .filter-chips, .monitor-types { @apply mb-4 flex flex-wrap gap-2; }
            .filter-chip, .monitor-type-tag { @apply rounded border border-slate-300 px-3 py-1 text-sm text-slate-700 hover:bg-slate-50; }
            .monitor-type-badge { @apply inline-flex rounded bg-slate-100 px-2 py-1 text-xs; }
            .monitors-container { @apply rounded border border-slate-200 bg-white; }
            .monitors-table { @apply overflow-x-auto; }
            .empty-state { @apply rounded border border-dashed border-slate-300 bg-white p-8 text-center text-slate-500; }
            .empty-icon { @apply text-3xl text-slate-400; }
            .empty-text { @apply text-sm text-slate-500; }
            .empty-title { @apply mb-1 font-medium text-slate-900; }
            .empty-description { @apply mb-4 text-sm text-slate-500; }

            .logs-viewer { @apply h-[60vh] overflow-auto rounded border border-slate-200 bg-slate-950 p-3 font-mono text-xs text-slate-100; }
            .logs-toolbar, .logs-info, .log-summary { @apply flex flex-wrap items-center gap-3; }
            .logs-toolbar { @apply mb-3 gap-2; }
            .log-summary { @apply text-sm; }
            .log-count { @apply flex items-center gap-1; }
            .log-count-badge { @apply rounded bg-slate-100 px-2 py-0.5 text-xs text-slate-700; }
            .loading-indicator { @apply items-center gap-2 text-sm text-slate-500; }
            .log-filter-btn { @apply rounded border border-slate-300 px-3 py-1 text-sm hover:bg-slate-50; }
            .log-entry { @apply border-b border-slate-800 py-2; }
            .log-header { @apply mb-1 flex flex-wrap gap-2 text-slate-400; }
            .log-time, .log-source { @apply text-slate-500; }
            .log-badge { @apply rounded bg-slate-800 px-1.5 text-xs; }
            .log-badge.error, .log-badge.ERROR { @apply bg-red-900 text-red-100; }
            .log-badge.warning, .log-badge.WARNING { @apply bg-amber-900 text-amber-100; }
            .log-badge.info, .log-badge.INFO { @apply bg-sky-900 text-sky-100; }
            .log-content { @apply whitespace-pre-wrap break-words text-slate-100; }
            .log-empty { @apply p-6 text-center text-slate-400; }
            .log-empty-icon { @apply mb-2 text-2xl; }

            .alert { @apply rounded border p-3 text-sm; }
            .alert-success { @apply border-green-200 bg-green-50 text-green-800; }
            .alert-danger, .alert-error { @apply border-red-200 bg-red-50 text-red-800; }
            .alert-info { @apply border-sky-200 bg-sky-50 text-sky-800; }
            .alert-warning { @apply border-amber-200 bg-amber-50 text-amber-800; }
            .modal { @apply fixed inset-0 z-50 hidden items-center justify-center bg-black/40 p-4; }
            .modal.show { @apply flex; }
            .modal-content { @apply max-h-[90vh] w-full max-w-xl overflow-auto rounded bg-white p-4; }
            .modal-header { @apply mb-3 flex items-center justify-between border-b border-slate-200 pb-3; }
            .modal-title { @apply text-lg font-semibold; }
            .modal-close { @apply rounded p-2 hover:bg-slate-100; }
            .modal-body { @apply space-y-3; }
            .modal-footer { @apply mt-4 flex justify-end gap-2 border-t border-slate-200 pt-3; }
            .config-modal-overlay { @apply fixed inset-0 z-50 flex items-center justify-center bg-black/40 p-4; }
            .config-modal-content { @apply max-h-[90vh] w-full max-w-2xl overflow-auto rounded bg-white; }
            .config-modal-header { @apply sticky top-0 z-10 flex items-center justify-between gap-3 border-b border-slate-200 bg-white px-4 py-3; }
            .config-modal-body { @apply space-y-4 p-4; }
            .config-modal-close { @apply rounded p-2 hover:bg-slate-100; }
            .config-summary { @apply grid gap-2 sm:grid-cols-2; }
            .config-row { @apply rounded border border-slate-200 bg-slate-50 p-3; }
            .config-row-wide { @apply sm:col-span-2; }
            .config-row-label { @apply block text-xs text-slate-500; }
            .config-row-value { @apply mt-1 block break-words text-sm font-medium text-slate-900; }
            .status-badge { @apply inline-flex shrink-0 rounded px-2 py-0.5 text-xs font-medium; }
            .status-badge-success { @apply bg-green-100 text-green-700; }
            .status-badge-muted { @apply bg-slate-100 text-slate-600; }
            .json-details { @apply rounded border border-slate-200 p-3 text-sm; }

            .nested-config, .monitor-config { @apply rounded border border-slate-200 bg-slate-50 p-3; }
            .monitor-config { @apply p-4; }
            .config-card-icon { @apply mb-3 text-xl text-blue-600; }
            .config-card-title { @apply mb-2 font-semibold; }
            .config-card-description { @apply mb-4 text-sm text-slate-500; }
            .account-select-wrapper, .import-mode-wrapper { @apply mb-4; }
            .mode-content { @apply ml-2 inline-flex flex-col text-sm; }
            .mode-title { @apply font-medium; }
            .mode-description { @apply text-xs text-slate-500; }
            .file-input { @apply hidden; }
            .preview-section { @apply mt-4 rounded border border-slate-200 bg-white p-4; }
            .preview-header { @apply mb-3 flex items-center justify-between; }
            .preview-title { @apply font-semibold; }
            .preview-actions { @apply flex gap-2; }
            .preview-content { @apply max-h-96 overflow-auto rounded bg-slate-950 p-3 font-mono text-xs text-slate-100; }
            .action-bar { @apply mb-4 flex flex-wrap items-center justify-between gap-3; }

            .messages-grid { @apply grid gap-4 md:grid-cols-2 xl:grid-cols-3; }
            .message-header { @apply mb-3 flex items-start justify-between gap-3; }
            .message-title { @apply font-medium; }
            .message-status { @apply rounded bg-slate-100 px-2 py-1 text-xs; }
            .message-content { @apply my-3 whitespace-pre-wrap rounded bg-slate-50 p-3 text-sm; }
            .message-target { @apply text-sm text-slate-500; }
            .message-actions { @apply mt-3 flex flex-wrap gap-2; }

            .wizard-container { @apply space-y-4; }
            .wizard-steps { @apply grid gap-2 rounded border border-slate-200 bg-white p-3 text-sm md:grid-cols-5; }
            .wizard-step { @apply flex items-center gap-2 rounded px-2 py-2 text-slate-500; }
            .wizard-step.active, .wizard-step.completed, .monitor-type-card.selected, .monitor-type-card.active { @apply border-blue-600 bg-blue-50 text-blue-700; }
            .wizard-step-number { @apply flex h-6 w-6 items-center justify-center rounded-full bg-slate-100 text-xs; }
            .wizard-step-title { @apply font-medium; }
            .wizard-progress { @apply mb-4 h-2 rounded bg-slate-200; }
            .wizard-progress-bar { @apply h-2 rounded bg-blue-600; }
            .wizard-content { @apply rounded border border-slate-200 bg-white p-4; }
            .wizard-content-header { @apply mb-4 border-b border-slate-200 pb-3; }
            .wizard-content-title { @apply text-lg font-semibold; }
            .wizard-content-description { @apply text-sm text-slate-500; }
            .step-content { @apply space-y-4; }
            .monitor-type-grid { @apply grid gap-3 sm:grid-cols-2 lg:grid-cols-3; }
            .monitor-type-card { @apply cursor-pointer rounded border border-slate-200 bg-white p-4 hover:bg-slate-50; }
            .monitor-type-icon { @apply mb-2 text-xl text-blue-600; }
            .monitor-type-name, .form-radio-title, .form-checkbox-title { @apply font-medium; }
            .monitor-type-desc, .form-radio-description, .form-checkbox-description { @apply mt-1 text-sm text-slate-500; }
            .form-radio-description, .form-checkbox-description { @apply mt-0 text-xs; }
            .tag-input-container { @apply rounded border border-slate-300 bg-white px-3 py-2; }
            .tag-input { @apply w-full text-sm outline-none; }
            .form-radio { @apply flex items-start gap-2 rounded border border-slate-200 p-3 text-sm; }
            .form-checkbox-label { @apply text-sm; }
            .field-spacer { @apply mt-4; }
            .wizard-footer { @apply mt-6 flex flex-wrap items-center justify-between gap-3 border-t border-slate-200 pt-4; }
            .wizard-footer-actions { @apply flex gap-2; }
            .help-examples { @apply mt-2 rounded border border-slate-200 bg-slate-50 p-3 text-xs text-slate-600; }
            .completion-container { @apply mx-auto max-w-3xl space-y-4; }
            .completion-header { @apply flex items-start gap-3 rounded border border-green-200 bg-green-50 p-4; }
            .completion-icon { @apply flex h-9 w-9 shrink-0 items-center justify-center rounded bg-green-600 text-white; }
            .completion-title { @apply text-lg font-semibold text-slate-900; }
            .completion-message { @apply mt-1 text-sm text-slate-600; }
            .action-cards { @apply grid gap-3 md:grid-cols-3; }
            .action-card { @apply flex w-full items-start gap-3 rounded border border-slate-200 bg-white p-4 text-left hover:bg-slate-50; }
            .action-card-icon { @apply flex h-9 w-9 shrink-0 items-center justify-center rounded bg-blue-50 text-lg text-blue-600; }
            .action-card-title { @apply font-medium leading-5; }
            .action-card-description { @apply mt-1 text-sm leading-5 text-slate-500; }
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">
    <div class="min-h-screen">
        <aside id="sidebar" class="fixed inset-y-0 left-0 z-40 w-64 -translate-x-full border-r border-slate-200 bg-white transition md:translate-x-0">
            <nav class="space-y-1 p-3 text-sm">
                <a href="/" class="nav-link {% if request.url.path == '/' %}active{% endif %}">
                    <i class="bi bi-speedometer2"></i><span>仪表板</span>
                </a>
                <a href="/accounts" class="nav-link {% if '/accounts' in request.url.path %}active{% endif %}">
                    <i class="bi bi-people"></i><span>账号</span>
                </a>
                <a href="/monitors" class="nav-link {% if '/monitors' in request.url.path %}active{% endif %}">
                    <i class="bi bi-eye"></i><span>规则</span>
                </a>
                <a href="/wizard" class="nav-link {% if '/wizard' in request.url.path %}active{% endif %}">
                    <i class="bi bi-magic"></i><span>新建规则</span>
                </a>
                <div class="my-3 border-t border-slate-200"></div>
                <a href="/scheduled-messages" class="nav-link {% if '/scheduled-messages' in request.url.path %}active{% endif %}">
                    <i class="bi bi-clock"></i><span>计划任务</span>
                </a>
                <a href="/forwards" class="nav-link {% if '/forwards' in request.url.path %}active{% endif %}">
                    <i class="bi bi-send"></i><span>转发列表</span>
                </a>
                <a href="/channels" class="nav-link {% if '/channels' in request.url.path %}active{% endif %}">
                    <i class="bi bi-list-ul"></i><span>目标列表</span>
                </a>
                <a href="/config-export" class="nav-link {% if '/config-export' in request.url.path %}active{% endif %}">
                    <i class="bi bi-download"></i><span>配置</span>
                </a>
                <a href="/logs" class="nav-link {% if '/logs' in request.url.path %}active{% endif %}">
                    <i class="bi bi-terminal"></i><span>日志</span>
                </a>
                <a href="/docs" target="_blank" class="nav-link">
                    <i class="bi bi-book"></i><span>API文档</span>
                </a>
            </nav>
            <div class="absolute inset-x-0 bottom-0 border-t border-slate-200 p-3 text-xs text-slate-500">
                <div class="flex items-center gap-2">
                    <span class="status-indicator h-2 w-2 rounded-full bg-green-500"></span>
                    <span class="status-text">系统运行中</span>
                    <span id="uptime" class="ml-auto">-</span>
                </div>
            </div>
        </aside>

        <div id="sidebarOverlay" class="fixed inset-0 z-30 hidden bg-black/30 md:hidden"></div>

        <main class="min-h-screen md:ml-64">
            <header class="sticky top-0 z-20 border-b border-slate-200 bg-white">
                <div class="flex min-h-14 items-center gap-3 px-4">
                    <button id="mobileMenuToggle" class="btn btn-secondary md:hidden" type="button">
                        <i class="bi bi-list"></i>
                    </button>
                    <div class="min-w-0">
                        <h1 class="truncate text-lg font-semibold">{% block page_title %}仪表板{% endblock %}</h1>
                        <p class="hidden truncate text-sm text-slate-500 sm:block">{% block page_subtitle %}概览{% endblock %}</p>
                    </div>
                    <button class="btn btn-secondary ml-auto" type="button" onclick="loadStats()" title="刷新状态">
                        <i class="bi bi-arrow-clockwise"></i><span class="hidden sm:inline">刷新</span>
                    </button>
                    <button class="btn btn-secondary" type="button" onclick="logout()">
                        <i class="bi bi-box-arrow-right"></i><span class="hidden sm:inline">退出</span>
                    </button>
                </div>
            </header>

            <div class="content p-4">
                {% block content %}{% endblock %}
            </div>
            <div id="notification-area" class="fixed right-4 top-4 z-50 space-y-2"></div>
        </main>
    </div>

    <script>
        const esc = value => String(value ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

        function setVisible(target, visible, mode = 'block') {
            const el = typeof target === 'string' ? document.getElementById(target) : target;
            if (!el) return;
            el.classList.toggle('hidden', !visible);
            el.classList.remove('grid', 'flex');
            if (visible && mode === 'grid') el.classList.add('grid');
            if (visible && mode === 'flex') el.classList.add('flex');
        }

        function showNotification(message, type = 'info') {
            const box = document.createElement('div');
            box.className = `alert alert-${type}`;
            box.innerHTML = `<div class="flex items-start gap-2"><span class="flex-1">${esc(message)}</span><button type="button" onclick="this.closest('.alert').remove()">x</button></div>`;
            document.getElementById('notification-area')?.appendChild(box);
            setTimeout(() => box.remove(), 5000);
        }

        let currentSystemStatus = '';

        function setSystemStatus(status) {
            const statusKey = status || 'running';
            if (statusKey === currentSystemStatus) return;
            const indicator = document.querySelector('.status-indicator');
            const text = document.querySelector('.status-text');
            if (!indicator || !text) return;
            const map = {
                running: ['bg-green-500', '系统运行中'],
                '运行中': ['bg-green-500', '系统运行中'],
                stopped: ['bg-red-500', '系统已停止'],
                '已停止': ['bg-red-500', '系统已停止'],
                partial: ['bg-amber-500', '部分连接'],
                '部分连接': ['bg-amber-500', '部分连接'],
                unconfigured: ['bg-slate-400', '未配置'],
                '未配置': ['bg-slate-400', '未配置'],
            };
            const [color, label] = map[statusKey] || map.running;
            indicator.className = `status-indicator h-2 w-2 rounded-full ${color}`;
            text.textContent = label;
            currentSystemStatus = statusKey;
        }

        function updateSystemStats(stats = {}) {
            const uptime = document.getElementById('uptime');
            if (stats.uptime && uptime && uptime.textContent !== stats.uptime) uptime.textContent = stats.uptime;
            setSystemStatus(stats.status);
            if (typeof updateDashboardStats === 'function') updateDashboardStats(stats);
        }

        function loadStats() {
            fetch('/api/stats').then(r => r.json()).then(updateSystemStats).catch(() => setSystemStatus('partial'));
        }

        function logout() {
            if (!confirm('确定要退出登录吗？')) return;
            fetch('/logout', {method: 'POST'}).finally(() => location.href = '/login');
        }

        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('mobileMenuToggle')?.addEventListener('click', () => {
                document.getElementById('sidebar')?.classList.toggle('-translate-x-full');
                document.getElementById('sidebarOverlay')?.classList.toggle('hidden');
            });
            document.getElementById('sidebarOverlay')?.addEventListener('click', () => {
                document.getElementById('sidebar')?.classList.add('-translate-x-full');
                document.getElementById('sidebarOverlay')?.classList.add('hidden');
            });

            loadStats();
        });
    </script>
    {% block extra_js %}{% endblock %}
</body>
</html>
