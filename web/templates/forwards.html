{% extends "base.html" %}

{% block title %}转发列表{% endblock %}
{% block page_title %}转发列表{% endblock %}
{% block page_subtitle %}只保留最新 500 条，失败可重试{% endblock %}

{% block content %}
<section class="data-card">
    <div class="mb-4 flex flex-wrap gap-2">
        <select id="status-filter" class="form-input max-w-40">
            <option value="">全部</option>
            <option value="failed">失败</option>
            <option value="success">成功</option>
            <option value="pending">等待</option>
        </select>
        <button class="btn btn-secondary" onclick="loadForwards()">刷新</button>
    </div>
    <div class="table-responsive">
        <table class="table">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>状态</th>
                    <th>账号</th>
                    <th>来源</th>
                    <th>目标</th>
                    <th>次数</th>
                    <th>更新时间</th>
                    <th>错误</th>
                    <th>操作</th>
                </tr>
            </thead>
            <tbody id="forward-rows">
                <tr><td colspan="9">加载中...</td></tr>
            </tbody>
        </table>
    </div>
</section>
{% endblock %}

{% block extra_js %}
<script>
const tbody = document.getElementById('forward-rows');
const statusText = status => ({success: '成功', failed: '失败', pending: '等待'}[status] || status);

async function loadForwards() {
    const status = document.getElementById('status-filter').value;
    const data = await fetch(`/api/forwards?limit=500${status ? `&status=${status}` : ''}`).then(r => r.json());
    const rows = data.records || [];
    tbody.innerHTML = rows.length ? rows.map(row => `
        <tr>
            <td>${row.id}</td>
            <td>${statusText(row.status)}</td>
            <td>${esc(row.account_id)}</td>
            <td>${row.source_chat_id}/${row.source_message_id}</td>
            <td>${row.target_id}</td>
            <td>${row.attempts}</td>
            <td>${esc(row.updated_at)}</td>
            <td title="${esc(row.last_error)}">${esc(row.last_error).slice(0, 80)}</td>
            <td>${row.status === 'failed' ? `<button class="btn btn-primary btn-sm" onclick="retryForward(${row.id})">重试</button>` : ''}</td>
        </tr>
    `).join('') : '<tr><td colspan="9">暂无记录</td></tr>';
}

async function retryForward(id) {
    const result = await fetch(`/api/forwards/${id}/retry`, {method: 'POST'}).then(r => r.json());
    if (!result.success) alert(result.message || '重试失败');
    await loadForwards();
}

document.getElementById('status-filter').addEventListener('change', loadForwards);
loadForwards();
</script>
{% endblock %}
