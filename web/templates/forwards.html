{% extends "base.html" %}

{% block title %}转发列表 - TG监控系统{% endblock %}
{% block page_title %}转发列表{% endblock %}
{% block page_subtitle %}仅保留最新500条转发记录，失败记录可重试{% endblock %}

{% block content %}
<div class="data-card">
    <div style="display:flex; gap:12px; margin-bottom:16px;">
        <select id="status-filter" class="form-input" style="max-width:160px;">
            <option value="">全部</option>
            <option value="failed">失败</option>
            <option value="success">成功</option>
            <option value="pending">等待</option>
        </select>
        <button class="btn btn-secondary" onclick="loadForwards()">刷新</button>
    </div>
    <div style="overflow:auto;">
        <table class="table" style="width:100%;">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>状态</th>
                    <th>账号</th>
                    <th>来源</th>
                    <th>目标</th>
                    <th>次数</th>
                    <th>更新时间</th>
                    <th>错误</th>
                    <th>操作</th>
                </tr>
            </thead>
            <tbody id="forward-rows">
                <tr><td colspan="9">加载中...</td></tr>
            </tbody>
        </table>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
const tbody = document.getElementById('forward-rows');
const esc = value => String(value ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const statusText = status => ({success:'成功', failed:'失败', pending:'等待'}[status] || status);

async function loadForwards() {
    const status = document.getElementById('status-filter').value;
    const url = `/api/forwards?limit=500${status ? `&status=${status}` : ''}`;
    const data = await fetch(url).then(r => r.json());
    const rows = data.records || [];
    tbody.innerHTML = rows.length ? rows.map(row => `
        <tr>
            <td>${row.id}</td>
            <td>${statusText(row.status)}</td>
            <td>${esc(row.account_id)}</td>
            <td>${row.source_chat_id}/${row.source_message_id}</td>
            <td>${row.target_id}</td>
            <td>${row.attempts}</td>
            <td>${esc(row.updated_at)}</td>
            <td title="${esc(row.last_error)}">${esc(row.last_error).slice(0, 80)}</td>
            <td>${row.status === 'failed' ? `<button class="btn btn-primary" onclick="retryForward(${row.id})">重试</button>` : ''}</td>
        </tr>
    `).join('') : '<tr><td colspan="9">暂无记录</td></tr>';
}

async function retryForward(id) {
    const result = await fetch(`/api/forwards/${id}/retry`, {method:'POST'}).then(r => r.json());
    if (!result.success) alert(result.message || '重试失败');
    await loadForwards();
}

document.getElementById('status-filter').addEventListener('change', loadForwards);
loadForwards();
</script>
{% endblock %}
